<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Truth</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .main-btn {
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            background: #00f2ff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 10;
        }

        .main-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.6);
        }

        .main-btn:active {
            transform: scale(0.95);
        }

        /* Stylized Popups */
        .prank-popup {
            position: absolute;
            background: white;
            color: black;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <button class="main-btn" onclick="triggerPrank()">Who is Thadrkuri?</button>

    <script>
        // List of websites to redirect to
        const sites = [
            "https://en.wikipedia.org/wiki/Vijay_(actor)",
            "https://www.google.com/search?q=Vijay+news",
    
        ];

        function triggerPrank() {
            // 1. Play the sound
            const audio = new Audio('moan.mp3');
            audio.play();

            // 2. Create popups on screen
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    createPopup("VIJAYYYY SAPPIIII!");
                }, i * 150);
            }

            // 3. Redirect to a random site after a short delay
            setTimeout(() => {
                const randomSite = sites[Math.floor(Math.random() * sites.length)];
                window.open(randomSite, '_blank');
            }, 1000);
        }

        function createPopup(text) {
            const popup = document.createElement('div');
            popup.className = 'prank-popup';
            popup.innerText = text;
            
            // Random position
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 50);
            
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            
            document.body.appendChild(popup);
        }
    </script>
</body>
</html>
