<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Select</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; margin: 0; }
        .hidden { display: none; }
        .container { padding: 50px 20px; }
        .friend-btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #333; color: white; }
        #profile-pic { width: 250px; height: 250px; object-fit: cover; border-radius: 50%; border: 4px solid #fff; cursor: pointer; margin: 20px 0; }
        .notes-section { margin-top: 40px; background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 500px; margin-inline: auto; }
        #note-list { text-align: left; max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .note-item { background: #333; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
        #note-input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        #popup { display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 40px; border-radius: 15px; z-index: 100; box-shadow: 0 0 50px cyan; }
    </style>
</head>
<body>

    <div id="selection-page" class="container">
        <h1>Select One</h1>
        <button class="friend-btn" onclick="showProfile('Friend1', 'f1.jpg', '555-1111')">Friend 1</button>
        <button class="friend-btn" onclick="showProfile('Friend2', 'f2.jpg', '555-2222')">Friend 2</button>
        <button class="friend-btn" onclick="showProfile('Friend3', 'f3.jpg', '555-3333')">Friend 3</button>
    </div>

    <div id="profile-page" class="container hidden">
        <h1 id="friend-name"></h1>
        <img id="profile-pic" src="" alt="Photo">
        <br><button onclick="location.reload()">Go Back</button>

        <div class="notes-section">
            <h3>Notes from Visitors</h3>
            <div id="note-list"></div>
            <input type="text" id="note-input" placeholder="Write something...">
            <button onclick="saveNote()" style="padding:10px;">Post</button>
        </div>
    </div>

    <div id="popup">
        <h2 id="popup-word">YOUR_WORD_HERE</h2>
        <button onclick="document.getElementById('popup').style.display='none'">Close</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // PASTE YOUR FIREBASE CONFIG FROM STEP 2.4 HERE
        const firebaseConfig = {
            apiKey: "...",
            authDomain: "...",
            databaseURL: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let clicks = 0;
        let selectedFriend = "";
        let selectedPhone = "";

        function showProfile(name, img, phone) {
            selectedFriend = name;
            selectedPhone = phone;
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('profile-page').classList.remove('hidden');
            document.getElementById('friend-name').innerText = name;
            document.getElementById('profile-pic').src = img;
            loadNotes();
        }

        document.getElementById('profile-pic').onclick = function() {
            clicks++;
            if(clicks === 1) new Audio('moan.mp3').play();
            else if(clicks === 2) alert("Phone: " + selectedPhone);
            else if(clicks === 3) {
                document.getElementById('popup').style.display = 'block';
                clicks = 0;
            }
        };

        function saveNote() {
            const val = document.getElementById('note-input').value;
            if(!val) return;
            db.ref('notes/' + selectedFriend).push({ text: val });
            document.getElementById('note-input').value = "";
        }

        function loadNotes() {
            db.ref('notes/' + selectedFriend).on('value', (snap) => {
                const list = document.getElementById('note-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    list.innerHTML += `<div class="note-item">${child.val().text}</div>`;
                });
            });
        }
    </script>
</body>
</html>
